services:
  postgres:
    image: postgres:18.3
    container_name: ordering-food-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ordering_food
      POSTGRES_USER: ordering_food
      POSTGRES_PASSWORD: ordering_food
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordering_food -d ordering_food"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.6.1
    container_name: ordering-food-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ordering-food-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP__HOST: 0.0.0.0
      DATABASE__URL: postgres://ordering_food:ordering_food@postgres:5432/ordering_food
      REDIS__URL: redis://redis:6379
    labels:
      autoheal: "true"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ordering-food-frontend
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    labels:
      autoheal: "true"
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: ordering-food-nginx
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
      frontend:
        condition: service_healthy
    labels:
      autoheal: "true"
    ports:
      - "127.0.0.1:18081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  dbhub:
    image: bytebase/dbhub
    container_name: ordering-food-dbhub
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "1000:1000"
    command:
      - --transport
      - http
      - --port
      - "1000"
      - --dsn
      - "postgres://ordering_food:ordering_food@postgres:5432/ordering_food?sslmode=disable"

  autoheal:
    image: willfarrell/autoheal:1.1.0
    container_name: ordering-food-autoheal
    restart: unless-stopped
    network_mode: none
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 10
      AUTOHEAL_START_PERIOD: 0
      AUTOHEAL_ONLY_MONITOR_RUNNING: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      server:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
