services:
  postgres:
    image: postgres:18.3
    container_name: ordering-food-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ordering_food
      POSTGRES_USER: ordering_food
      POSTGRES_PASSWORD: ordering_food
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordering_food -d ordering_food"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.6.1
    container_name: ordering-food-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ordering-food-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP__HOST: 0.0.0.0
      DATABASE__URL: postgres://ordering_food:ordering_food@postgres:5432/ordering_food
      REDIS__URL: redis://redis:6379
    ports:
      - "${APP__PORT:-8080}:${APP__PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
  redis-data:
