<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ordering Food</title>
    <script>
      ;(() => {
        var stored, mode, prefersDark, resolved, root
        try {
          stored = window.localStorage.getItem('theme')
          mode = stored === 'light' || stored === 'dark' || stored === 'auto' ? stored : 'auto'
          prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          resolved = mode === 'auto' ? (prefersDark ? 'dark' : 'light') : mode
          root = document.documentElement
          root.classList.remove('light', 'dark')
          root.classList.add(resolved)
          if (mode === 'auto') {
            root.removeAttribute('data-theme')
          } else {
            root.setAttribute('data-theme', mode)
          }
          root.style.colorScheme = resolved
        } catch (_e) {}
      })()
    </script>
  </head>
  <body class="font-sans wrap-anywhere antialiased selection:bg-[rgba(79,184,178,0.24)]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
